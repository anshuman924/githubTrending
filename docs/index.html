<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Trending Reports</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #19181a;
      --panel: #221f22;
      --panel-strong: #2d2a2e;
      --text: #fcfcfa;
      --muted: #c1c0c0;
      --border: #403e41;
      --accent: #ffd866;
      --purple: #ab9df2;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      background: linear-gradient(180deg, #2d2a2e 0%, #221f22 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px;
    }

    .topbar,
    main {
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      color: var(--accent);
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
    }

    main {
      padding: 20px;
    }

    .reports {
      display: grid;
      gap: 12px;
    }

    .report-link {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      padding: 16px;
      text-decoration: none;
    }

    .report-link:hover {
      border-color: rgba(255, 216, 102, 0.48);
      background: var(--panel-strong);
    }

    .report-title {
      color: var(--accent);
      font-size: 19px;
      font-weight: 700;
    }

    .report-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
    }

    .open-label {
      color: var(--purple);
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>GitHub Trending Reports</h1>
      <div class="meta">2 reports available</div>
    </div>
  </header>
  <main>
    <section class="reports"><a class="report-link" href="2026-06-26.html">
  <span class="report-title">2026-06-26</span>
  <span class="report-stats">
    <span>16 repositories</span>
    <span>49681 summary tokens</span>
  </span>
  <span class="open-label">Open report</span>
</a>
<a class="report-link" href="2026-06-18.html">
  <span class="report-title">2026-06-18</span>
  <span class="report-stats">
    <span>16 repositories</span>
    <span>60566 summary tokens</span>
  </span>
  <span class="open-label">Open report</span>
</a></section>
  </main>
</body>
</html>
